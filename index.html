<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>portfolio</title>
    <style>

        * {
            background-color: #333131;
            box-sizing: border-box;
            color: white;
        }

        .project-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .project-container a {
            display: flex;
            flex-direction: column;
            text-decoration: none;
            border: 2px solid white;
        }

        .project-container a:hover {
            transform: scale(1.05);
            transition: transform 0.1s ease-in-out;
        }

        .project-container h2, p {
            color: white;
            text-align: center;
        }

        .project-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        @media (max-width: 768px) {
            .project-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <h1 style="text-align: center; font-size: 2em;">My projects:</h1>

    <div class="project-container"></div>

    <script>
        const projects = [
            {
                title: "Web File App",
                desc: "A simple google drive like app that allows you to upload and download files.",
                image: "static/webfile.png",
                link: "https://github.com/petrolbras/webFileApp"
            },
            {
                title: "Haxball-bot",
                desc: "A bot for the online game Haxball that organizes your custom rooms",
                image: "static/haxballgif.gif",
                link: "https://github.com/petrolbras/haxball_bot"
            },
            {
                title: "A GPS based on dijktras's algorithm",
                desc: "A simple GPS application that uses Dijkstra's algorithm to find the shortest path between two points.",
                image: "static/gps.png",
                link: "https://github.com/petrolbras/dijkstra-atividade-faculdade"
            },
            {
                title: "A tictactoe game",
                desc: "A command line tictactoe game made in C",
                image: "static/tictactoegif.gif",
                link: "https://github.com/petrolbras/jogodavelha-ferauche"
            }
        ];

        for (const item of projects) {
            const projectDiv = document.createElement("a");
            const title = document.createElement("h2");
            const desc = document.createElement("p");
            const image = document.createElement("img");

            projectDiv.href = item.link;
            title.textContent = item.title;
            desc.textContent = item.desc;
            image.src = item.image;

            projectDiv.appendChild(title);
            projectDiv.appendChild(desc);
            projectDiv.appendChild(image);

            document.querySelector(".project-container").appendChild(projectDiv);
        }
    </script>
</body>
</html>
